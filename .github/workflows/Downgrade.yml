name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    name: "Downgrade"
    # Disabled: lower compat bounds (Distributions 0.24, Compat 3.27, etc.) don't resolve on Julia 1.10
    if: false
    strategy:
      matrix:
        julia-version: ['1.10']
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "${{ matrix.julia-version }}"
      skip: "Pkg,TOML"
    secrets: "inherit"
